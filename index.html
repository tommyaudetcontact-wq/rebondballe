<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-select=no">
    <title>Rebond Ball Volley V4.7 - Proportionnel 16:9</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <style>
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: #121212;
            overflow: hidden;
            touch-action: none;
            user-select: none;
            color: #ffffff;
            font-family: sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        /* CONTENEUR DE JEU TOUJOURS EN 16:9 CENTRÉ */
        .game-area {
            position: relative;
            background: #0d0d1a;
            overflow: visible;
            box-shadow: 0 0 30px rgba(0,0,0,0.8);
            border: 2px solid #333;
        }
        .inner-container {
            position: relative;
            width: 100%;
            height: 100%;
            overflow: hidden;
        }
        #webcam {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            transform: scaleX(-1);
            object-fit: cover;
            opacity: 0.35;
            z-index: 1;
        }
        .court {
            position: absolute;
            top: 0;
            width: 50%;
            height: 100%;
            pointer-events: none;
            z-index: 2;
        }
        .court-p1 {
            left: 0;
            background: rgba(13, 202, 240, 0.18);
            border-right: 1px dashed rgba(255,255,255,0.2);
        }
        .court-p2 {
            right: 0;
            background: rgba(255, 65, 54, 0.18);
            border-left: 1px dashed rgba(255,255,255,0.2);
        }
        .net {
            position: absolute;
            bottom: 0;
            left: calc(50% - 6px);
            width: 12px;
            height: 50%; /* Prend 50% de la hauteur de la zone de jeu */
            background: repeating-linear-gradient(0deg, #ffffff, #ffffff 10px, #333 10px, #333 20px);
            border: 2px solid #ffffff;
            box-shadow: 0 0 15px rgba(255,255,255,0.4);
            z-index: 5;
        }
        #ball {
            position: absolute;
            width: 50px;
            height: 50px;
            border-radius: 50%;
            background: radial-gradient(circle at 30% 30%, #fff3cd, #ffc107 40%, #ba3000);
            box-shadow: 0 10px 25px rgba(0,0,0,0.6);
            z-index: 999; 
            pointer-events: none;
            left: 0;
            top: 0;
        }
        #ball.hit {
            background: radial-gradient(circle at 30% 30%, #a3ffb4, #198754 40%, #0b4124);
        }
        #offscreenBubble {
            position: absolute;
            top: 95px; 
            width: 55px;
            height: 55px;
            background: radial-gradient(circle at 30% 30%, #fff, #ffc107 70%, #cc8500);
            z-index: 15;
            display: none;
            pointer-events: none;
            border-radius: 50%;
            border: 3px solid #ffffff;
            box-shadow: 0 0 20px #ffc107;
            transform: translateX(-50%);
        }
        #offscreenBubble::after {
            content: '';
            position: absolute;
            bottom: -12px;
            left: 16px;
            border-width: 12px 8px 0;
            border-style: solid;
            border-color: #ffffff transparent;
        }
        .bubble-text {
            font-size: 11px;
            color: #000000;
            font-weight: 900;
            display: block;
            text-align: center;
            line-height: 49px;
        }
        .hand-cursor {
            position: absolute;
            width: 80px; 
            height: 80px;
            border-radius: 50%;
            z-index: 12;
            pointer-events: none;
            display: none;
            left: 0;
            top: 0;
        }
        .color-p1 {
            background: rgba(13, 202, 240, 0.35);
            border: 3px dashed #0dcaf0;
        }
        .color-p2 {
            background: rgba(255, 65, 54, 0.35);
            border: 3px dashed #ff4136;
        }
        .hud-display {
            position: absolute;
            top: 10px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 100;
            width: 90%;
            max-width: 650px;
            pointer-events: none;
            transition: opacity 0.15s ease-in-out;
        }
        .card-hud {
            background: rgba(18, 18, 18, 0.85);
            backdrop-filter: blur(5px);
            border: 1px solid #444;
        }
        #loadingOverlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(13, 13, 26, 0.95);
            z-index: 200;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
    </style>
</head>
<body>

    <div class="hud-display text-center" id="hudZone">
        <div class="card card-hud rounded p-2 shadow-lg">
            <div class="row align-items-center m-0">
                <div class="col-4 text-start text-info fw-bold">
                    <small class="d-block text-muted text-uppercase" style="font-size: 10px;">Joueur 1 (Bleu)</small>
                    <span class="fs-5" id="scoreJ1Field">0</span>
                    <div id="manchesJ1" class="text-info mt-1" style="font-size: 11px; letter-spacing: 2px;">⚪⚪⚪</div>
                </div>
                <div class="col-4 text-center">
                    <small class="d-block text-muted text-uppercase" style="font-size: 9px;">Vitesse</small>
                    <span class="badge bg-success" id="speedField">100%</span>
                </div>
                <div class="col-4 text-end text-danger fw-bold">
                    <small class="d-block text-muted text-uppercase" style="font-size: 10px;">Joueur 2 (Rouge)</small>
                    <span class="fs-5" id="scoreJ2Field">0</span>
                    <div id="manchesJ2" class="text-danger mt-1" style="font-size: 11px; letter-spacing: 2px;">⚪⚪⚪</div>
                </div>
            </div>
        </div>
    </div>

    <div class="game-area" id="mainStage">
        <div id="offscreenBubble"><span class="bubble-text" id="bubbleHeight">0</span></div>
        
        <div class="inner-container">
            <div id="loadingOverlay">
                <div id="spinner" class="spinner-border text-warning mb-3" role="status"></div>
                <h3 id="statusText" class="fw-bold mb-4">Calcul des scripts IA...</h3>
                
                <div id="menuButtons" class="d-none">
                    <button id="btn1P" class="btn btn-info btn-lg fw-bold text-dark m-2 px-4 py-3">👤 1 JOUEUR (Entraînement)</button>
                    <button id="btn2P" class="btn btn-danger btn-lg fw-bold m-2 px-4 py-3">⚔️ TOURNOI (3 MANCHES)</button>
                </div>
            </div>

            <div class="court court-p1"></div>
            <div class="court court-p2"></div>
            <div class="net"></div>

            <video id="webcam" autoplay playsinline></video>
            <div id="ball"></div>
            <div id="hand0" class="hand-cursor"></div>
            <div id="hand1" class="hand-cursor"></div>
        </div>
    </div>

    <script type="module">
        import { FilesetResolver, HandLandmarker } from "https://unpkg.com/@mediapipe/tasks-vision@0.10.8/vision_bundle.mjs";

        const video = document.getElementById('webcam');
        const ballEl = document.getElementById('ball');
        const bubbleEl = document.getElementById('offscreenBubble');
        const bubbleHeightText = document.getElementById('bubbleHeight');
        const loadingOverlay = document.getElementById('loadingOverlay');
        const statusText = document.getElementById('statusText');
        const spinner = document.getElementById('spinner');
        const hudZone = document.getElementById('hudZone');
        const mainStage = document.getElementById('mainStage');
        
        const scoreJ1Field = document.getElementById('scoreJ1Field');
        const scoreJ2Field = document.getElementById('scoreJ2Field');
        const manchesJ1El = document.getElementById('manchesJ1');
        const manchesJ2El = document.getElementById('manchesJ2');
        const speedField = document.getElementById('speedField');
        
        const btn1P = document.getElementById('btn1P');
        const btn2P = document.getElementById('btn2P');
        const menuButtons = document.getElementById('menuButtons');
        const handDivs = [document.getElementById('hand0'), document.getElementById('hand1')];

        let handLandmarker = undefined;
        let lastVideoTime = -1;
        let frameCount = 0;
        let lastHandsData = [];
        let isGameOverAnnulling = false;
        
        window.gameMode = 2; 

        let scoreJ1 = 0; let scoreJ2 = 0;
        let manchesJ1 = 0; let manchesJ2 = 0;

        let GAME_WIDTH = 800;
        let GAME_HEIGHT = 450;
        
        // MODIFICATION PHYSIQUE DE LA LÉGÈRETÉ DE LA BALLE ACCORDÉE
        const INITIAL_BOUNCE = -8.0;  // Plus de rebond
        const INITIAL_GRAVITY = 0.22; // Balle plus légère (vitesse V3)

        let ball = {
            x: 400, y: 120, 
            radius: 25, 
            vx: 3, vy: 0,
            gravity: INITIAL_GRAVITY, 
            bounceForce: INITIAL_BOUNCE, 
            hitTimer: 0    
        };

        let playersTracker = [
            { id: 0, active: false, x: 200, y: 225, cooldown: 0, lastSeen: 0 }, 
            { id: 1, active: false, x: 600, y: 225, cooldown: 0, lastSeen: 0 }  
        ];

        // LOGIQUE DE CALCUL DU RESOLUTION RESPONSIVE COMPLETEMENT UNIFIÉE (16:9 BASÉ SUR LE CÔTÉ LE MOINS LONG)
        function resizeResponsiveStage() {
            const screenW = window.innerWidth;
            const screenH = window.innerHeight;

            // Déterminer le côté le moins long
            if (screenW / screenH > 16 / 9) {
                // Écran très large (PC) : Se calibrer sur la hauteur
                GAME_HEIGHT = screenH;
                GAME_WIDTH = screenH * (16 / 9);
            } else {
                // Écran vertical ou carré (Mobile/Tablette) : Se calibrer sur la largeur
                GAME_WIDTH = screenW;
                GAME_HEIGHT = screenW / (16 / 9);
            }

            // Assigner les tailles au conteneur principal CSS
            mainStage.style.width = `${GAME_WIDTH}px`;
            mainStage.style.height = `${GAME_HEIGHT}px`;
        }

        // Exécuter immédiatement au démarrage et lors du pivot de l'appareil
        resizeResponsiveStage();
        window.addEventListener('resize', resizeResponsiveStage);

        async function initIA() {
            try {
                const vision = await FilesetResolver.forVisionTasks("https://unpkg.com/@mediapipe/tasks-vision@0.10.8/wasm");
                handLandmarker = await HandLandmarker.createFromOptions(vision, {
                    baseOptions: {
                        modelAssetPath: "https://storage.googleapis.com/mediapipe-models/hand_landmarker/hand_landmarker/float16/1/hand_landmarker.task",
                        delegate: "GPU"
                    },
                    runningMode: "VIDEO",
                    numHands: 2,
                    minHandDetectionConfidence: 0.4,
                    minHandPresenceConfidence: 0.4
                });
                if(spinner) spinner.classList.add('d-none');
                if(statusText) statusText.innerText = "Prêt pour le match !";
                if(menuButtons) menuButtons.classList.remove('d-none');
            } catch (err) {
                if(statusText) statusText.innerText = "Erreur IA : " + err;
            }
        }

        async function launchGame(mode) {
            window.gameMode = mode;
            if(menuButtons) menuButtons.classList.add('d-none');
            if(spinner) spinner.classList.remove('d-none');
            if(statusText) statusText.innerText = "Lancement de la caméra...";

            resetScores();
            updateManchesDisplay();

            try {
                const stream = await navigator.mediaDevices.getUserMedia({ 
                    video: { width: 320, height: 240, frameRate: { ideal: 30 } } 
                });
                video.srcObject = stream;
                video.addEventListener('loadeddata', () => {
                    if(loadingOverlay) loadingOverlay.classList.add('d-none');
                    resetBall();
                    isGameOverAnnulling = false;
                    requestAnimationFrame(gameLoop);
                });
            } catch (err) {
                alert("Erreur caméra. Vérifie les autorisations de ton navigateur.");
            }
        }

        function updateManchesDisplay() {
            if(manchesJ1El) manchesJ1El.innerText = "🟢 ".repeat(manchesJ1) + "⚪ ".repeat(3 - manchesJ1);
            if(manchesJ2El) manchesJ2El.innerText = "🟢 ".repeat(manchesJ2) + "⚪ ".repeat(3 - manchesJ2);
        }

        function resetScores() {
            scoreJ1 = 0; scoreJ2 = 0;
            if(scoreJ1Field) scoreJ1Field.innerText = "0";
            if(scoreJ2Field) scoreJ2Field.innerText = "0";
            ball.bounceForce = INITIAL_BOUNCE;
            ball.gravity = INITIAL_GRAVITY;
            if(speedField) speedField.innerText = "100%";
            playersTracker[0].x = GAME_WIDTH * 0.25; playersTracker[0].cooldown = 0;
            playersTracker[1].x = GAME_WIDTH * 0.75; playersTracker[1].cooldown = 0;
        }

        if(btn1P) btn1P.addEventListener('pointerdown', (e) => { e.preventDefault(); launchGame(1); });
        if(btn2P) btn2P.addEventListener('pointerdown', (e) => { e.preventDefault(); launchGame(2); });

        function triggerGameOver(losingArea) {
            isGameOverAnnulling = true;
            if(bubbleEl) bubbleEl.style.display = "none";
            if(hudZone) hudZone.style.opacity = "1"; 

            if (window.gameMode === 2) {
                if (losingArea === "left") {
                    scoreJ2 += 1;
                    if(scoreJ2Field) scoreJ2Field.innerText = scoreJ2;
                    if(statusText) statusText.innerHTML = "<span class='text-danger display-6 fw-bold'>🔴 POINT POUR LE JOUEUR 2 !</span>";
                    manchesJ2++;
                } else {
                    scoreJ1 += 1;
                    if(scoreJ1Field) scoreJ1Field.innerText = scoreJ1;
                    if(statusText) statusText.innerHTML = "<span class='text-info display-6 fw-bold'>🔵 POINT POUR LE JOUEUR 1 !</span>";
                    manchesJ1++;
                }
            } else {
                if(statusText) statusText.innerHTML = "<span class='text-warning display-6 fw-bold'>💥 BALLE AU SOL !</span>";
            }
            
            updateManchesDisplay();

            if(loadingOverlay) loadingOverlay.classList.remove('d-none');
            handDivs[0].style.display = "none";
            handDivs[1].style.display = "none";

            if (manchesJ1 >= 3) {
                if(statusText) statusText.innerHTML = "<span class='text-info display-4 fw-bold'>🏆 LE JOUEUR 1 REMPORTE LE MATCH ! 🏆</span>";
                manchesJ1 = 0; manchesJ2 = 0;
            } else if (manchesJ2 >= 3) {
                if(statusText) statusText.innerHTML = "<span class='text-danger display-4 fw-bold'>🏆 LE JOUEUR 2 REMPORTE LE MATCH ! 🏆</span>";
                manchesJ1 = 0; manchesJ2 = 0;
            }

            setTimeout(() => {
                if(loadingOverlay) loadingOverlay.classList.add('d-none');
                scoreJ1 = 0; scoreJ2 = 0;
                if(scoreJ1Field) scoreJ1Field.innerText = "0";
                if(scoreJ2Field) scoreJ2Field.innerText = "0";
                updateManchesDisplay();
                resetBall();
                lastHandsData = []; 
                isGameOverAnnulling = false;
                requestAnimationFrame(gameLoop);
            }, 2500);
        }

        function gameLoop() {
            if (isGameOverAnnulling) return; 

            frameCount++;

            if (frameCount % 2 === 0 && video.currentTime !== lastVideoTime) {
                lastVideoTime = video.currentTime;
                if (handLandmarker) {
                    try {
                        const detections = handLandmarker.detectForVideo(video, performance.now());
                        if (detections && detections.landmarks) {
                            lastHandsData = detections.landmarks;
                        }
                    } catch(e) { /* Sécurité anti-crash IA */ }
                }
            }

            // --- PHYSIQUE MOTEUR ---
            ball.vy += ball.gravity; 
            ball.x += ball.vx;
            ball.y += ball.vy;

            if (ball.x - ball.radius < 0) { ball.x = ball.radius; ball.vx *= -1; }
            else if (ball.x + ball.radius > GAME_WIDTH) { ball.x = GAME_WIDTH - ball.radius; ball.vx *= -1; }

            // DETECTION COLLISION OVERLAP DU HUD RELATIVE À LA BOÎTE DU STAGE
            if(hudZone) {
                const hudWidth = Math.min(GAME_WIDTH * 0.9, 650);
                const hudLeft = (GAME_WIDTH - hudWidth) / 2;
                const hudRight = hudLeft + hudWidth;
                const hudBottom = 95;

                if (ball.y - ball.radius < hudBottom && ball.x + ball.radius > hudLeft && ball.x - ball.radius < hudRight) {
                    hudZone.style.opacity = "0"; 
                } else {
                    hudZone.style.opacity = "1";
                }
            }

            if (ball.y < 0) {
                if(bubbleEl) {
                    bubbleEl.style.display = "block";
                    bubbleEl.style.left = `${ball.x}px`; 
                }
                if(bubbleHeightText) bubbleHeightText.innerText = Math.abs(Math.round(ball.y));
            } else {
                if(bubbleEl) bubbleEl.style.display = "none";
            }

            // LE FILET RESTE PARFAITEMENT AU MILIEU (50% de GAME_HEIGHT)
            const netTopY = GAME_HEIGHT * 0.5;
            if (ball.y + ball.radius > netTopY) {
                if (Math.abs(ball.x - (GAME_WIDTH / 2)) < ball.radius + 6) {
                    ball.vx *= -1.05; 
                    ball.x = ball.x < (GAME_WIDTH / 2) ? (GAME_WIDTH / 2) - ball.radius - 8 : (GAME_WIDTH / 2) + ball.radius + 8;
                }
            }

            if (ball.y > GAME_HEIGHT - ball.radius) {
                const losingSide = ball.x < (GAME_WIDTH / 2) ? "left" : "right";
                triggerGameOver(losingSide);
                return;
            }

            if (playersTracker[0].cooldown > 0) playersTracker[0].cooldown--;
            if (playersTracker[1].cooldown > 0) playersTracker[1].cooldown--;

            playersTracker[0].active = false;
            playersTracker[1].active = false;
            handDivs[0].style.display = "none";
            handDivs[1].style.display = "none";

            let detectedHands = [];
            lastHandsData.forEach((landmarks) => {
                if(landmarks && landmarks[9]) {
                    const palmPoint = landmarks[9];
                    const rawX = (1 - palmPoint.x) * GAME_WIDTH;
                    const rawY = palmPoint.y * GAME_HEIGHT;
                    detectedHands.push({ x: rawX, y: rawY });
                }
            });

            if (detectedHands.length > 0) {
                if (detectedHands.length === 1) {
                    const hand = detectedHands[0];
                    const distToJ1 = Math.hypot(hand.x - playersTracker[0].x, hand.y - playersTracker[0].y);
                    const distToJ2 = Math.hypot(hand.x - playersTracker[1].x, hand.y - playersTracker[1].y);
                    let targetIdx = distToJ1 < distToJ2 ? 0 : 1;
                    if (performance.now() - playersTracker[targetIdx].lastSeen > 2000) {
                        targetIdx = hand.x < GAME_WIDTH / 2 ? 0 : 1;
                    }
                    playersTracker[targetIdx].active = true;
                    playersTracker[targetIdx].x = hand.x;
                    playersTracker[targetIdx].y = hand.y;
                    playersTracker[targetIdx].lastSeen = performance.now();
                } else if (detectedHands.length === 2) {
                    const h0 = detectedHands[0]; const h1 = detectedHands[1];
                    const costA = Math.hypot(h0.x - playersTracker[0].x, h0.y - playersTracker[0].y) + Math.hypot(h1.x - playersTracker[1].x, h1.y - playersTracker[1].y);
                    const costB = Math.hypot(h1.x - playersTracker[0].x, h1.y - playersTracker[0].y) + Math.hypot(h0.x - playersTracker[1].x, h0.y - playersTracker[1].y);
                    if (costA < costB) {
                        playersTracker[0].active = true; playersTracker[0].x = h0.x; playersTracker[0].y = h0.y;
                        playersTracker[1].active = true; playersTracker[1].x = h1.x; playersTracker[1].y = h1.y;
                    } else {
                        playersTracker[0].active = true; playersTracker[0].x = h1.x; playersTracker[0].y = h1.y;
                        playersTracker[1].active = true; playersTracker[1].x = h0.x; playersTracker[1].y = h0.y;
                    }
                    playersTracker[0].lastSeen = performance.now(); playersTracker[1].lastSeen = performance.now();
                }
            }

            playersTracker.forEach((player, index) => {
                if (!player.active) return;
                const div = handDivs[index];
                if(div) {
                    div.style.display = "block";
                    div.style.left = (player.x - 40) + "px";
                    div.style.top = (player.y - 40) + "px";
                    
                    div.className = "hand-cursor";
                    if (window.gameMode === 1) {
                        div.classList.add("color-p1");
                    } else {
                        if (player.id === 0) div.classList.add("color-p1");
                        if (player.id === 1) div.classList.add("color-p2");
                    }
                }
            });

            // --- DEVIATIONS ET COLLISIONS ---
            let handHit = false;
            for (const player of playersTracker) {
                if (!player.active || player.cooldown > 0) continue;

                if (window.gameMode === 2) {
                    if (player.id === 0 && player.x > (GAME_WIDTH / 2)) continue;
                    if (player.id === 1 && player.x < (GAME_WIDTH / 2)) continue;
                }

                const distance = Math.hypot(player.x - ball.x, player.y - ball.y);
                if (distance < (ball.radius + 40)) {
                    handHit = true;
                    player.cooldown = 12; 

                    ball.vx = (ball.x - player.x) * 0.28; 
                    ball.vy = ball.bounceForce; 
                    ball.hitTimer = 8;
                    break; 
                }
            }

            if (handHit) {
                ball.bounceForce -= 0.10; 
                ball.gravity += 0.005;
                const percentage = Math.round((ball.bounceForce / INITIAL_BOUNCE) * 100);
                if(speedField) speedField.innerText = percentage + "%";
            }

            if(ballEl) {
                ballEl.style.left = (ball.x - ball.radius) + "px";
                ballEl.style.top = (ball.y - ball.radius) + "px";
                
                if (ball.hitTimer > 0) {
                    ballEl.classList.add('hit');
                    ball.hitTimer--;
                } else {
                    ballEl.classList.remove('hit');
                }
            }

            requestAnimationFrame(gameLoop);
        }

        function resetBall() {
            ball.x = GAME_WIDTH / 2;
            ball.y = GAME_HEIGHT * 0.25; // Réapparition à 25% de la hauteur dynamique
            ball.vy = 1;
            ball.vx = Math.random() > 0.5 ? 3.5 : -3.5; 
            ball.bounceForce = INITIAL_BOUNCE;
            ball.gravity = INITIAL_GRAVITY;
            if(speedField) speedField.innerText = "100%";
        }

        initIA();
    </script>
</body>
</html>
