<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jeu de Rebond V2.1 - Collision Sphère Bleue</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <style>
        body {
            background-color: #121212;
            overflow-x: hidden;
            touch-action: manipulation;
            user-select: none;
        }
        .game-area {
            position: relative;
            width: 640px;
            height: 480px;
            margin: 0 auto;
            background: #0d0d1a;
            overflow: hidden;
        }
        #webcam {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            transform: scaleX(-1);
            object-fit: cover;
            opacity: 0.35;
        }
        /* BALLON CSS BOOSTÉ PAR LE GPU */
        #ball {
            position: absolute;
            width: 80px;
            height: 80px;
            border-radius: 50%;
            background: radial-gradient(circle at 30% 30%, #fff3cd, #ffc107 40%, #ba3c00);
            box-shadow: 0 10px 25px rgba(0,0,0,0.6);
            z-index: 10;
            pointer-events: none;
            left: 0;
            top: 0;
            will-change: transform;
        }
        #ball.hit {
            background: radial-gradient(circle at 30% 30%, #a3ffb4, #198754 40%, #0b4124);
        }
        /* GROS CURSEURS DE MAINS (80px) AVEC LESQUELS LE BALLON INTERAGIT */
        .hand-cursor {
            position: absolute;
            width: 80px; 
            height: 80px;
            background: rgba(13, 202, 240, 0.35);
            border: 3px dashed #0dcaf0;
            border-radius: 50%;
            z-index: 12;
            pointer-events: none;
            display: none;
            left: 0;
            top: 0;
            will-change: transform;
        }
        #loadingOverlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.9);
            z-index: 20;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }
    </style>
</head>
<body class="text-white py-4">

    <div class="container text-center">
        <h1 class="display-5 fw-bold text-success mb-1">⚽ REBOND V2.1 ⚽</h1>
        <p class="lead text-muted mb-3">Collision exclusive entre le ballon et la sphère bleue !</p>

        <div class="row justify-content-center mb-3">
            <div class="col-md-4 col-6">
                <div class="card bg-dark border-success text-white p-2">
                    <small class="text-muted uppercase">Vitesse actuelle</small>
                    <h4 class="m-0 text-info" id="speedField">100%</h4>
                </div>
            </div>
            <div class="col-md-4 col-6">
                <div class="card bg-dark border-warning text-white p-2">
                    <small class="text-muted uppercase">Score</small>
                    <h4 class="m-0 text-warning" id="scoreField">0</h4>
                </div>
            </div>
        </div>

        <div class="game-area border border-success rounded shadow-lg">
            <div id="loadingOverlay">
                <div id="spinner" class="spinner-border text-success mb-3" role="status"></div>
                <h4 id="statusText">Configuration de la physique des sphères...</h4>
                <button id="startBtn" class="btn btn-success btn-lg d-none fw-bold">JOUER</button>
            </div>

            <video id="webcam" autoplay playsinline></video>
            <div id="ball"></div>
            <div id="hand0" class="hand-cursor"></div>
            <div id="hand1" class="hand-cursor"></div>
        </div>
    </div>

    <script type="module">
        import { FilesetResolver, HandLandmarker } from "https://unpkg.com/@mediapipe/tasks-vision@0.10.8/vision_bundle.mjs";

        const video = document.getElementById('webcam');
        const ballEl = document.getElementById('ball');
        const startBtn = document.getElementById('startBtn');
        const loadingOverlay = document.getElementById('loadingOverlay');
        const statusText = document.getElementById('statusText');
        const spinner = document.getElementById('spinner');
        const scoreField = document.getElementById('scoreField');
        const speedField = document.getElementById('speedField');
        
        const handDivs = [document.getElementById('hand0'), document.getElementById('hand1')];

        let handLandmarker = undefined;
        let lastVideoTime = -1;
        let score = 0;
        let frameCount = 0;
        let lastHandsData = [];

        const GAME_WIDTH = 640;
        const GAME_HEIGHT = 480;

        const INITIAL_BOUNCE = -8.0;
        const INITIAL_GRAVITY = 0.22;

        let ball = {
            x: 320, y: 60, radius: 40,
            vx: 2.5, vy: 0,
            gravity: INITIAL_GRAVITY, 
            bounceForce: INITIAL_BOUNCE, 
            hitTimer: 0    
        };

        // Stockage des positions réelles des boules bleues pour la physique
        let liveCursors = [
            { active: false, x: 0, y: 0 },
            { active: false, x: 0, y: 0 }
        ];

        async function initIA() {
            try {
                const vision = await FilesetResolver.forVisionTasks("https://unpkg.com/@mediapipe/tasks-vision@0.10.8/wasm");
                handLandmarker = await HandLandmarker.createFromOptions(vision, {
                    baseOptions: {
                        modelAssetPath: "https://storage.googleapis.com/mediapipe-models/hand_landmarker/hand_landmarker/float16/1/hand_landmarker.task",
                        delegate: "GPU"
                    },
                    runningMode: "VIDEO",
                    numHands: 2,
                    minHandDetectionConfidence: 0.4,
                    minHandPresenceConfidence: 0.4
                });
                spinner.classList.add('d-none');
                statusText.innerText = "Physique 2.1 connectée !";
                startBtn.classList.remove('d-none');
            } catch (err) {
                statusText.innerText = "Erreur CDN : " + err;
            }
        }

        startBtn.addEventListener('pointerdown', async (e) => {
            e.preventDefault();
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ 
                    video: { width: 320, height: 240, frameRate: { ideal: 30 } } 
                });
                video.srcObject = stream;
                video.addEventListener('loadeddata', () => {
                    loadingOverlay.classList.add('d-none');
                    resetBall();
                    requestAnimationFrame(gameLoop);
                });
            } catch (err) {
                alert("Erreur d'autorisation caméra.");
            }
        });

        function gameLoop() {
            frameCount++;

            if (frameCount % 2 === 0 && video.currentTime !== lastVideoTime) {
                lastVideoTime = video.currentTime;
                if (handLandmarker) {
                    const detections = handLandmarker.detectForVideo(video, performance.now());
                    if (detections && detections.landmarks) {
                        lastHandsData = detections.landmarks;
                    }
                }
            }

            // --- DEPLACEMENT PHYSIQUE DU BALLON ---
            ball.vy += ball.gravity; 
            ball.x += ball.vx;
            ball.y += ball.vy;

            if (ball.x - ball.radius < 0) { ball.x = ball.radius; ball.vx *= -1; }
            else if (ball.x + ball.radius > GAME_WIDTH) { ball.x = GAME_WIDTH - ball.radius; ball.vx *= -1; }
            if (ball.y - ball.radius < 0) { ball.y = ball.radius; ball.vy *= -1; }

            if (ball.y > GAME_HEIGHT - ball.radius) {
                score = 0;
                scoreField.innerText = score;
                ball.bounceForce = INITIAL_BOUNCE;
                ball.gravity = INITIAL_GRAVITY;
                speedField.innerText = "100%";
                resetBall();
            }

            // Reset des états des curseurs pour cette frame
            liveCursors[0].active = false;
            liveCursors[1].active = false;
            handDivs[0].style.display = "none";
            handDivs[1].style.display = "none";

            // --- EXTRACTION DE LA POSITION DES BOULES BLEUES ---
            lastHandsData.forEach((landmarks, index) => {
                if (index > 1) return;
                
                const palmPoint = landmarks[9]; // Centre de la main
                const visualX = (1 - palmPoint.x) * GAME_WIDTH;
                const visualY = palmPoint.y * GAME_HEIGHT;

                // On stocke les coordonnées pour la boucle de collision physique
                liveCursors[index].active = true;
                liveCursors[index].x = visualX;
                liveCursors[index].y = visualY;

                // Affichage visuel du gros curseur de 80px (rayon 40)
                const div = handDivs[index];
                div.style.display = "block";
                div.style.transform = `translate(${visualX - 40}px, ${visualY - 40}px)`;
            });

            // --- VÉRIFICATION DE LA COLLISION ENTRE SPHÈRES ---
            let handHit = false;

            for (const cursor of liveCursors) {
                if (!cursor.active) continue;

                // Distance centre à centre entre la boule jaune et la boule bleue
                const distance = Math.hypot(cursor.x - ball.x, cursor.y - ball.y);
                const cursorRadius = 40; // La boule bleue fait 80px de large, donc 40px de rayon

                // Si la distance est plus petite que la somme des deux rayons, il y a impact !
                // On garde la sécurité ball.vy > -1 pour éviter les rebonds infinis collés
                if (distance < (ball.radius + cursorRadius) && ball.vy > -1) {
                    handHit = true;
                    
                    // Angle de rebond calculé à partir de la position de la boule bleue
                    ball.vx = (ball.x - cursor.x) * 0.25; 
                    ball.vy = ball.bounceForce; 
                    ball.hitTimer = 8;
                    break;
                }
            }

            if (handHit) {
                score += 1;
                scoreField.innerText = score;
                
                ball.bounceForce -= 0.25; 
                ball.gravity += 0.01;
                
                const percentage = Math.round((ball.bounceForce / INITIAL_BOUNCE) * 100);
                speedField.innerText = percentage + "%";
            }

            // Rafraîchissement graphique du ballon
            ballEl.style.transform = `translate(${ball.x - ball.radius}px, ${ball.y - ball.radius}px)`;
            
            if (ball.hitTimer > 0) {
                ballEl.classList.add('hit');
                ball.hitTimer--;
            } else {
                ballEl.classList.remove('hit');
            }

            requestAnimationFrame(gameLoop);
        }

        function resetBall() {
            ball.x = Math.random() * 340 + 150;
            ball.y = 50;
            ball.vy = Math.random() * 2 + 1;
            const baseDir = Math.random() > 0.5 ? 1 : -1;
            ball.vx = baseDir * (Math.abs(ball.bounceForce) * 0.35); 
        }

        initIA();
    </script>
</body>
</html>
