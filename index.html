<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-select=no">
    <title>Rebond Ball Volley V4.3 - Plein Écran Tournoi</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <style>
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: #121212;
            overflow: hidden;
            touch-action: none;
            user-select: none;
            color: #ffffff;
            font-family: sans-serif;
        }
        /* DESIGN 100% PLEIN ÉCRAN NATION */
        .game-area {
            position: absolute;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            overflow: visible;
            z-index: 1;
        }
        .inner-container {
            position: relative;
            width: 100%;
            height: 100%;
            overflow: hidden;
        }
        #webcam {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            transform: scaleX(-1);
            object-fit: cover;
            opacity: 0.35;
            z-index: 1;
        }
        .court {
            position: absolute;
            top: 0;
            width: 50%;
            height: 100%;
            pointer-events: none;
            z-index: 2;
        }
        .court-p1 {
            left: 0;
            background: rgba(13, 202, 240, 0.18);
            border-right: 1px dashed rgba(255,255,255,0.2);
        }
        .court-p2 {
            right: 0;
            background: rgba(255, 65, 54, 0.18);
            border-left: 1px dashed rgba(255,255,255,0.2);
        }
        /* FILET ADAPTATIF : EXACTEMENT LA MOITIÉ DE L'ÉCRAN VERTICAL (50vh) */
        .net {
            position: absolute;
            bottom: 0;
            left: calc(50% - 6px);
            width: 12px;
            height: 50vh; 
            background: repeating-linear-gradient(0deg, #ffffff, #ffffff 10px, #333 10px, #333 20px);
            border: 2px solid #ffffff;
            box-shadow: 0 0 15px rgba(255,255,255,0.4);
            z-index: 5;
        }
        #ball {
            position: absolute;
            width: 80px;
            height: 80px;
            border-radius: 50%;
            background: radial-gradient(circle at 30% 30%, #fff3cd, #ffc107 40%, #ba3c00);
            box-shadow: 0 10px 25px rgba(0,0,0,0.6);
            z-index: 10;
            pointer-events: none;
            left: 0;
            top: 0;
        }
        #ball.hit {
            background: radial-gradient(circle at 30% 30%, #a3ffb4, #198754 40%, #0b4124);
        }
        /* SMASH BROS TRACKER POSITIONNÉ DIRECTEMENT SOUS LE SCORE HUD */
        #offscreenBubble {
            position: absolute;
            top: 85px; 
            width: 55px;
            height: 55px;
            background: radial-gradient(circle at 30% 30%, #fff, #ffc107 70%, #cc8500);
            z-index: 15;
            display: none;
            pointer-events: none;
            border-radius: 50%;
            border: 3px solid #ffffff;
            box-shadow: 0 0 20px #ffc107;
            transform: translateX(-50%);
        }
        #offscreenBubble::after {
            content: '';
            position: absolute;
            bottom: -12px;
            left: 16px;
            border-width: 12px 8px 0;
            border-style: solid;
            border-color: #ffffff transparent;
        }
        .bubble-text {
            font-size: 11px;
            color: #000000;
            font-weight: 900;
            display: block;
            text-align: center;
            line-height: 49px;
        }
        .hand-cursor {
            position: absolute;
            width: 80px; 
            height: 80px;
            border-radius: 50%;
            z-index: 12;
            pointer-events: none;
            display: none;
            left: 0;
            top: 0;
        }
        .color-p1 {
            background: rgba(13, 202, 240, 0.35);
            border: 3px dashed #0dcaf0;
        }
        .color-p2 {
            background: rgba(255, 65, 54, 0.35);
            border: 3px dashed #ff4136;
        }
        /* HUD EN SURCOUCHE DU MATCH */
        .hud-display {
            position: absolute;
            top: 10px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 100;
            width: 90%;
            max-width: 650px;
            pointer-events: none;
        }
        .card-hud {
            background: rgba(18, 18, 18, 0.85);
            backdrop-filter: blur(5px);
            border: 1px solid #444;
        }
        #loadingOverlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(13, 13, 26, 0.95);
            z-index: 200;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .text-white-score {
            color: #ffffff !important;
            font-weight: 800;
        }
    </style>
</head>
<body>

    <div class="hud-display text-center">
        <div class="card card-hud rounded p-2 shadow-lg">
            <div class="row align-items-center m-0">
                <div class="col-4 text-start text-info fw-bold">
                    <small class="d-block text-muted text-uppercase" style="font-size: 10px;">Joueur 1 (Bleu)</small>
                    <span class="fs-5" id="scoreJ1Field">0</span>
                    <div id="manchesJ1" class="text-info mt-1" style="font-size: 11px; letter-spacing: 2px;">⚪⚪⚪</div>
                </div>
                <div class="col-4 text-center">
                    <small class="d-block text-muted text-uppercase" style="font-size: 9px;">Vitesse</small>
                    <span class="badge bg-success" id="speedField">100%</span>
                </div>
                <div class="col-4 text-end text-danger fw-bold">
                    <small class="d-block text-muted text-uppercase" style="font-size: 10px;">Joueur 2 (Rouge)</small>
                    <span class="fs-5" id="scoreJ2Field">0</span>
                    <div id="manchesJ2" class="text-danger mt-1" style="font-size: 11px; letter-spacing: 2px;">⚪⚪⚪</div>
                </div>
            </div>
        </div>
    </div>

    <div class="game-area">
        <div id="offscreenBubble"><span class="bubble-text" id="bubbleHeight">0</span></div>
        
        <div class="inner-container">
            <div id="loadingOverlay">
                <div id="spinner" class="spinner-border text-warning mb-3" role="status"></div>
                <h3 id="statusText" class="fw-bold mb-4">Calcul des scripts IA...</h3>
                
                <div id="menuButtons" class="d-none">
                    <button id="btn1P" class="btn btn-info btn-lg fw-bold text-dark m-2 px-4 py-3">👤 1 JOUEUR (Entraînement)</button>
                    <button id="btn2P" class="btn btn-danger btn-lg fw-bold m-2 px-4 py-3">⚔️ TOURNOI (3 MANCHES)</button>
                </div>
            </div>

            <div class="court court-p1"></div>
            <div class="court court-p2"></div>
            <div class="net"></div>

            <video id="webcam" autoplay playsinline></video>
            <div id="ball"></div>
            <div id="hand0" class="hand-cursor"></div>
            <div id="hand1" class="hand-cursor"></div>
        </div>
    </div>

    <script type="module">
        import { FilesetResolver, HandLandmarker } from "https://unpkg.com/@mediapipe/tasks-vision@0.10.8/vision_bundle.mjs";

        const video = document.getElementById('webcam');
        const ballEl = document.getElementById('ball');
        const bubbleEl = document.getElementById('offscreenBubble');
        const bubbleHeightText = document.getElementById('bubbleHeight');
        const loadingOverlay = document.getElementById('loadingOverlay');
        const statusText = document.getElementById('statusText');
        const spinner = document.getElementById('spinner');
        
        const scoreJ1Field = document.getElementById('scoreJ1Field');
        const scoreJ2Field = document.getElementById('scoreJ2Field');
        const manchesJ1El = document.getElementById('manchesJ1');
        const manchesJ2El = document.getElementById('manchesJ2');
        const speedField = document.getElementById('speedField');
        
        const btn1P = document.getElementById('btn1P');
        const btn2P = document.getElementById('btn2P');
        const menuButtons = document.getElementById('menuButtons');
        const handDivs = [document.getElementById('hand0'), document.getElementById('hand1')];

        let handLandmarker = undefined;
        let lastVideoTime = -1;
        let frameCount = 0;
        let lastHandsData = [];
        let gameMode = 1; 
        let isGameOverAnnulling = false;

        // Points de la manche en cours
        let scoreJ1 = 0; let scoreJ2 = 0;
        // Total de manches gagnées (premier à 3 gagne le match)
        let manchesJ1 = 0; let manchesJ2 = 0;

        // Coordonnées calculées à la volée selon le format natif plein écran
        let GAME_WIDTH = window.innerWidth;
        let GAME_HEIGHT = window.innerHeight;
        
        const INITIAL_BOUNCE = -7.5; 
        const INITIAL_GRAVITY = 0.28; 

        let ball = {
            x: GAME_WIDTH / 2, y: 100, radius: 40,
            vx: 3, vy: 0,
            gravity: INITIAL_GRAVITY, 
            bounceForce: INITIAL_BOUNCE, 
            hitTimer: 0    
        };

        // Algorithme de tracking V3 restauré à l'identique
        let playersTracker = [
            { id: 0, active: false, x: GAME_WIDTH * 0.25, y: GAME_HEIGHT * 0.5, cooldown: 0, lastSeen: 0 }, 
            { id: 1, active: false, x: GAME_WIDTH * 0.75, y: GAME_HEIGHT * 0.5, cooldown: 0, lastSeen: 0 }  
        ];

        // Recalculer les proportions si l'appareil change d'orientation
        window.addEventListener('resize', () => {
            GAME_WIDTH = window.innerWidth;
            GAME_HEIGHT = window.innerHeight;
        });

        async function initIA() {
            try {
                const vision = await FilesetResolver.forVisionTasks("https://unpkg.com/@mediapipe/tasks-vision@0.10.8/wasm");
                handLandmarker = await HandLandmarker.createFromOptions(vision, {
                    baseOptions: {
                        modelAssetPath: "https://storage.googleapis.com/mediapipe-models/hand_landmarker/hand_landmarker/float16/1/hand_landmarker.task",
                        delegate: "GPU"
                    },
                    runningMode: "VIDEO",
                    numHands: 2,
                    minHandDetectionConfidence: 0.4,
                    minHandPresenceConfidence: 0.4
                });
                spinner.classList.add('d-none');
                statusText.innerText = "Sélectionne la formule de jeu :";
                menuButtons.classList.remove('d-none');
            } catch (err) {
                statusText.innerText = "Erreur : " + err;
            }
        }

        async function launchGame(mode) {
            gameMode = mode;
            menuButtons.classList.add('d-none');
            spinner.classList.remove('d-none');
            statusText.innerText = "Ouverture de la caméra plein écran...";

            resetScores();
            updateManchesDisplay();

            try {
                const stream = await navigator.mediaDevices.getUserMedia({ 
                    video: { width: 320, height: 240, frameRate: { ideal: 30 } } 
                });
                video.srcObject = stream;
                video.addEventListener('loadeddata', () => {
                    loadingOverlay.classList.add('d-none');
                    resetBall();
                    isGameOverAnnulling = false;
                    requestAnimationFrame(gameLoop);
                });
            } catch (err) {
                alert("Erreur de caméra.");
            }
        }

        function updateManchesDisplay() {
            manchesJ1El.innerText = "🟢 ".repeat(manchesJ1) + "⚪ ".repeat(3 - manchesJ1);
            manchesJ2El.innerText = "🟢 ".repeat(manchesJ2) + "⚪ ".repeat(3 - manchesJ2);
        }

        function resetScores() {
            scoreJ1 = 0; scoreJ2 = 0;
            scoreJ1Field.innerText = "0"; scoreJ2Field.innerText = "0";
            ball.bounceForce = INITIAL_BOUNCE;
            ball.gravity = INITIAL_GRAVITY;
            speedField.innerText = "100% ";
            playersTracker[0].x = GAME_WIDTH * 0.25; playersTracker[0].cooldown = 0;
            playersTracker[1].x = GAME_WIDTH * 0.75; playersTracker[1].cooldown = 0;
        }

        btn1P.addEventListener('pointerdown', (e) => { e.preventDefault(); launchGame(1); });
        btn2P.addEventListener('pointerdown', (e) => { e.preventDefault(); launchGame(2); });

        function triggerGameOver(losingArea) {
            isGameOverAnnulling = true;
            bubbleEl.style.display = "none";

            // Attribution du point de manche au gagnant
            if (losingArea === "left") {
                scoreJ2 += 1;
                scoreJ2Field.innerText = scoreJ2;
                statusText.innerHTML = "<span class='text-danger display-6 fw-bold'>🔴 POINT POUR LE JOUEUR 2 !</span>";
            } else {
                scoreJ1 += 1;
                scoreJ1Field.innerText = scoreJ1;
                statusText.innerHTML = "<span class='text-info display-6 fw-bold'>🔵 POINT POUR LE JOUEUR 1 !</span>";
            }

            // Un point marqué valide immédiatement la manche pour le tournoi rapide
            if (losingArea === "left") manchesJ2++; else manchesJ1++;
            updateManchesDisplay();

            loadingOverlay.classList.remove('d-none');
            handDivs[0].style.display = "none";
            handDivs[1].style.display = "none";

            // Vérification du sacre final (3 manches gagnées)
            if (manchesJ1 >= 3) {
                statusText.innerHTML = "<span class='text-info display-4 fw-bold'>🏆 LE JOUEUR 1 GAGNE LE MATCH ! 🏆</span>";
                manchesJ1 = 0; manchesJ2 = 0;
            } else if (manchesJ2 >= 3) {
                statusText.innerHTML = "<span class='text-danger display-4 fw-bold'>🏆 LE JOUEUR 2 GAGNE LE MATCH ! 🏆</span>";
                manchesJ1 = 0; manchesJ2 = 0;
            }

            setTimeout(() => {
                loadingOverlay.classList.add('d-none');
                scoreJ1 = 0; scoreJ2 = 0;
                scoreJ1Field.innerText = "0"; scoreJ2Field.innerText = "0";
                updateManchesDisplay();
                resetBall();
                lastHandsData = []; 
                isGameOverAnnulling = false;
                requestAnimationFrame(gameLoop);
            }, 2500);
        }

        function gameLoop() {
            if (isGameOverAnnulling) return; 

            frameCount++;

            if (frameCount % 2 === 0 && video.currentTime !== lastVideoTime) {
                lastVideoTime = video.currentTime;
                if (handLandmarker) {
                    const detections = handLandmarker.detectForVideo(video, performance.now());
                    if (detections && detections.landmarks) {
                        lastHandsData = detections.landmarks;
                    }
                }
            }

            // --- PHYSIQUE (PLAFOND TOTALEMENT OUVERT) ---
            ball.vy += ball.gravity; 
            ball.x += ball.vx;
            ball.y += ball.vy;

            if (ball.x - ball.radius < 0) { ball.x = ball.radius; ball.vx *= -1; }
            else if (ball.x + ball.radius > GAME_WIDTH) { ball.x = GAME_WIDTH - ball.radius; ball.vx *= -1; }

            // BULLE DE RECENTREMENT SMASH BROS
            if (ball.y < 0) {
                bubbleEl.style.display = "block";
                bubbleEl.style.left = `${ball.x}px`; 
                bubbleHeightText.innerText = Math.abs(Math.round(ball.y));
            } else {
                bubbleEl.style.display = "none";
            }

            // FILET CENTRAL FIXÉ À 50% DE LA HAUTEUR DE L'ÉCRAN NATIVEMENT (GAME_HEIGHT * 0.5)
            const netTopY = GAME_HEIGHT * 0.5;
            if (ball.y + ball.radius > netTopY) {
                if (Math.abs(ball.x - (GAME_WIDTH / 2)) < ball.radius + 6) {
                    ball.vx *= -1.05; 
                    ball.x = ball.x < (GAME_WIDTH / 2) ? (GAME_WIDTH / 2) - ball.radius - 8 : (GAME_WIDTH / 2) + ball.radius + 8;
                }
            }

            if (ball.y > GAME_HEIGHT - ball.radius) {
                const losingSide = ball.x < (GAME_WIDTH / 2) ? "left" : "right";
                triggerGameOver(losingSide);
                return;
            }

            if (playersTracker[0].cooldown > 0) playersTracker[0].cooldown--;
            if (playersTracker[1].cooldown > 0) playersTracker[1].cooldown--;

            playersTracker[0].active = false;
            playersTracker[1].active = false;
            handDivs[0].style.display = "none";
            handDivs[1].style.display = "none";

            let detectedHands = [];
            lastHandsData.forEach((landmarks) => {
                const palmPoint = landmarks[9];
                const rawX = (1 - palmPoint.x) * GAME_WIDTH;
                const rawY = palmPoint.y * GAME_HEIGHT;
                detectedHands.push({ x: rawX, y: rawY });
            });

            // RESTAURATION STRICT DE LA GESTION PAR DISTANCE EUCLIDIENNE DE LA V3
            if (detectedHands.length > 0) {
                if (detectedHands.length === 1) {
                    const hand = detectedHands[0];
                    const distToJ1 = Math.hypot(hand.x - playersTracker[0].x, hand.y - playersTracker[0].y);
                    const distToJ2 = Math.hypot(hand.x - playersTracker[1].x, hand.y - playersTracker[1].y);
                    let targetIdx = distToJ1 < distToJ2 ? 0 : 1;
                    if (performance.now() - playersTracker[targetIdx].lastSeen > 2000) {
                        targetIdx = hand.x < GAME_WIDTH / 2 ? 0 : 1;
                    }
                    playersTracker[targetIdx].active = true;
                    playersTracker[targetIdx].x = hand.x;
                    playersTracker[targetIdx].y = hand.y;
                    playersTracker[targetIdx].lastSeen = performance.now();
                } else if (detectedHands.length === 2) {
                    const h0 = detectedHands[0]; const h1 = detectedHands[1];
                    const costA = Math.hypot(h0.x - playersTracker[0].x, h0.y - playersTracker[0].y) + Math.hypot(h1.x - playersTracker[1].x, h1.y - playersTracker[1].y);
                    const costB = Math.hypot(h1.x - playersTracker[0].x, h1.y - playersTracker[0].y) + Math.hypot(h0.x - playersTracker[1].x, h0.y - playersTracker[1].y);
                    if (costA < costB) {
                        playersTracker[0].active = true; playersTracker[0].x = h0.x; playersTracker[0].y = h0.y;
                        playersTracker[1].active = true; playersTracker[1].x = h1.x; playersTracker[1].y = h1.y;
                    } else {
                        playersTracker[0].active = true; playersTracker[0].x = h1.x; playersTracker[0].y = h1.y;
                        playersTracker[1].active = true; playersTracker[1].x = h0.x; playersTracker[1].y = h0.y;
                    }
                    playersTracker[0].lastSeen = performance.now(); playersTracker[1].lastSeen = performance.now();
                }
            }

            // RENDU SANS OPTIMISATION SCRIPT (CONSERVE LA STABILITÉ CSS COMMANDE)
            playersTracker.forEach((player, index) => {
                if (!player.active) return;
                const div = handDivs[index];
                div.style.display = "block";
                div.style.left = (player.x - 40) + "px";
                div.style.top = (player.y - 40) + "px";
                
                div.className = "hand-cursor";
                if (gameMode === 1) {
                    div.classList.add("color-p1");
                } else {
                    if (player.id === 0) div.classList.add("color-p1");
                    if (player.id === 1) div.classList.add("color-p2");
                }
            });

            // --- SECTEURS ET COLLISIONS ---
            let handHit = false;
            for (const player of playersTracker) {
                if (!player.active || player.cooldown > 0) continue;

                if (gameMode === 2) {
                    if (player.id === 0 && player.x > (GAME_WIDTH / 2)) continue;
                    if (player.id === 1 && player.x < (GAME_WIDTH / 2)) continue;
                }

                const distance = Math.hypot(player.x - ball.x, player.y - ball.y);
                if (distance < (ball.radius + 40)) {
                    handHit = true;
                    player.cooldown = 12; 

                    ball.vx = (ball.x - player.x) * 0.28; 
                    ball.vy = ball.bounceForce; 
                    ball.hitTimer = 8;
                    break; 
                }
            }

            if (handHit) {
                ball.bounceForce -= 0.10; 
                ball.gravity += 0.005;
                const percentage = Math.round((ball.bounceForce / INITIAL_BOUNCE) * 100);
                speedField.innerText = percentage + "%";
            }

            ballEl.style.left = (ball.x - ball.radius) + "px";
            ballEl.style.top = (ball.y - ball.radius) + "px";
            
            if (ball.hitTimer > 0) {
                ballEl.classList.add('hit');
                ball.hitTimer--;
            } else {
                ballEl.classList.remove('hit');
            }

            requestAnimationFrame(gameLoop);
        }

        function resetBall() {
            ball.x = GAME_WIDTH / 2;
            ball.y = 120;
            ball.vy = 1;
            ball.vx = Math.random() > 0.5 ? 3.5 : -3.5; 
            ball.bounceForce = INITIAL_BOUNCE;
            ball.gravity = INITIAL_GRAVITY;
            speedField.innerText = "100%";
        }

        initIA();
    </script>
</body>
</html>
