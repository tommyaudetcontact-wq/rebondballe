<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jeu de Rebond - Version Tactile Stable</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <style>
        body {
            background-color: #121212;
            overflow-x: hidden;
            /* Empêche les gestes de zoom par défaut sur mobile/tablette lors des tapes */
            touch-action: manipulation; 
        }
        .game-area {
            position: relative;
            width: 640px;
            height: 480px;
            margin: 0 auto;
            background: #1a1a2e;
            overflow: hidden;
        }
        #webcam, #handContainer {
            position: absolute;
            top: 0;
            left: 0;
            width: 640px;
            height: 480px;
            transform: scaleX(-1);
            object-fit: cover;
        }
        #handContainer {
            z-index: 11;
            pointer-events: none;
        }
        #ball {
            position: absolute;
            width: 80px;
            height: 80px;
            border-radius: 50%;
            background: radial-gradient(circle at 30% 30%, #fff3cd, #ffc107 40%, #ba3c00);
            box-shadow: 0 10px 20px rgba(0,0,0,0.5);
            z-index: 10;
            pointer-events: none;
            left: 0;
            top: 0;
        }
        #ball.hit {
            background: radial-gradient(circle at 30% 30%, #a3ffb4, #198754 40%, #0b4124);
        }
        .hand-dot {
            position: absolute;
            width: 8px;
            height: 8px;
            background-color: #0dcaf0;
            border-radius: 50%;
            pointer-events: none;
        }
        #loadingOverlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 640px;
            height: 480px;
            background: rgba(0,0,0,0.85);
            z-index: 20;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }
    </style>
</head>
<body class="text-white py-4">

    <div class="container text-center">
        <h1 class="display-5 fw-bold text-warning mb-2">⚽ Version Tactile Intégrale ⚽</h1>
        <p class="lead text-muted mb-4">Support d'écran tactile universel et correctif CDN appliqué.</p>

        <div class="row justify-content-center mb-3">
            <div class="col-md-4">
                <div class="card bg-dark border-warning text-white p-2">
                    <h3 class="m-0">Rebonds : <span id="scoreField" class="text-success fw-bold">0</span></h3>
                </div>
            </div>
        </div>

        <div class="game-area border border-warning rounded shadow-lg">
            <div id="loadingOverlay">
                <div id="spinner" class="spinner-border text-warning mb-3" role="status"></div>
                <h4 id="statusText">Vérification de la compatibilité matérielle...</h4>
                <button id="startBtn" class="btn btn-warning btn-lg d-none text-dark fw-bold">Jouer</button>
            </div>

            <video id="webcam" autoplay playsinline></video>
            <div id="ball"></div>
            <div id="handContainer"></div>
        </div>
    </div>

    <script type="module">
        import { FilesetResolver, HandLandmarker } from "https://unpkg.com/@mediapipe/tasks-vision@0.10.8/vision_bundle.mjs";

        const video = document.getElementById('webcam');
        const ballEl = document.getElementById('ball');
        const handContainer = document.getElementById('handContainer');
        const startBtn = document.getElementById('startBtn');
        const loadingOverlay = document.getElementById('loadingOverlay');
        const statusText = document.getElementById('statusText');
        const spinner = document.getElementById('spinner');
        const scoreField = document.getElementById('scoreField');

        let handLandmarker = undefined;
        let lastVideoTime = -1;
        let score = 0;
        let frameCount = 0;
        let lastHandsData = [];

        const GAME_WIDTH = 640;
        const GAME_HEIGHT = 480;

        let ball = {
            x: 320, y: 50, radius: 40,
            vx: 3, vy: 0,
            gravity: 0.25, bounceForce: -8.5, 
            hitTimer: 0    
        };

        async function initIA() {
            try {
                // Chargement unpkg : Zéro erreur de CORS en environnement local http://127.0.0.1
                const vision = await FilesetResolver.forVisionTasks("https://unpkg.com/@mediapipe/tasks-vision@0.10.8/wasm");
                
                handLandmarker = await HandLandmarker.createFromOptions(vision, {
                    baseOptions: {
                        modelAssetPath: "https://storage.googleapis.com/mediapipe-models/hand_landmarker/hand_landmarker/float16/1/hand_landmarker.task",
                        delegate: "GPU"
                    },
                    runningMode: "VIDEO",
                    numHands: 2,
                    minHandDetectionConfidence: 0.4,
                    minHandPresenceConfidence: 0.4
                });
                spinner.classList.add('d-none');
                statusText.innerText = "Prêt à démarrer !";
                startBtn.classList.remove('d-none');
            } catch (err) {
                statusText.innerText = "Erreur réseau CDN : " + err;
                console.error(err);
            }
        }

        // Événement universel 'pointerdown' : Déclenchement immédiat au doigt ou au clic de souris
        startBtn.addEventListener('pointerdown', async (e) => {
            e.preventDefault(); // Bloque les actions tactiles fantômes du navigateur
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ 
                    video: { width: 320, height: 240, frameRate: { ideal: 30 } } 
                });
                video.srcObject = stream;
                video.addEventListener('loadeddata', () => {
                    loadingOverlay.classList.add('d-none');
                    resetBall();
                    requestAnimationFrame(gameLoop);
                });
            } catch (err) {
                alert("Impossible de démarrer la caméra. Vérifie les permissions.");
            }
        });

        function gameLoop() {
            frameCount++;

            if (frameCount % 2 === 0 && video.currentTime !== lastVideoTime) {
                lastVideoTime = video.currentTime;
                if (handLandmarker) {
                    const detections = handLandmarker.detectForVideo(video, performance.now());
                    if (detections && detections.landmarks) {
                        lastHandsData = detections.landmarks;
                    }
                }
            }

            // --- PHYSIQUE ---
            ball.vy += ball.gravity; 
            ball.x += ball.vx;
            ball.y += ball.vy;

            if (ball.x - ball.radius < 0) { ball.x = ball.radius; ball.vx *= -1; }
            else if (ball.x + ball.radius > GAME_WIDTH) { ball.x = GAME_WIDTH - ball.radius; ball.vx *= -1; }
            if (ball.y - ball.radius < 0) { ball.y = ball.radius; ball.vy *= -1; }

            if (ball.y > GAME_HEIGHT - ball.radius) {
                score = 0;
                scoreField.innerText = score;
                resetBall();
            }

            handContainer.innerHTML = ""; 
            let handHit = false;

            for (const landmarks of lastHandsData) {
                for (const point of landmarks) {
                    const physicsHandX = (1 - point.x) * GAME_WIDTH;
                    const physicsHandY = point.y * GAME_HEIGHT;

                    const visualHandX = point.x * GAME_WIDTH;
                    const visualHandY = point.y * GAME_HEIGHT;

                    const dot = document.createElement('div');
                    dot.className = 'hand-dot';
                    dot.style.left = `${visualHandX - 4}px`;
                    dot.style.top = `${visualHandY - 4}px`;
                    handContainer.appendChild(dot);

                    const distance = Math.hypot(physicsHandX - ball.x, physicsHandY - ball.y);

                    if (distance < ball.radius + 10 && ball.vy > -1) {
                        handHit = true;
                        ball.vx = (ball.x - physicsHandX) * 0.25; 
                        ball.vy = ball.bounceForce; 
                        ball.hitTimer = 10;
                    }
                }
            }

            if (handHit) {
                score += 1;
                scoreField.innerText = score;
            }

            ballEl.style.transform = `translate(${ball.x - ball.radius}px, ${ball.y - ball.radius}px)`;
            
            if (ball.hitTimer > 0) {
                ballEl.classList.add('hit');
                ball.hitTimer--;
            } else {
                ballEl.classList.remove('hit');
            }

            requestAnimationFrame(gameLoop);
        }

        function resetBall() {
            ball.x = Math.random() * 360 + 140;
            ball.y = 50;
            ball.vy = Math.random() * 2 + 1;
            ball.vx = (Math.random() - 0.5) * 6; 
        }

        initIA();
    </script>
</body>
</html>
